<div class="navbar">
  <div class="logo">
    <img src="favicon.png" alt="logo">
    <h2>Nexus</h2>
  </div>

  <ul class="nav-links">
  <li routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    <a routerLink="/home">Home</a>
  </li>

  <li routerLinkActive="active">
    <a routerLink="/categories">Categories</a>
  </li>

  <li routerLinkActive="active">
    <a routerLink="/products">Products</a>
  </li>

  <li routerLinkActive="active">
    <a routerLink="/contact">Contact</a>
  </li>
</ul>

  <div class="right-nav">
    <!-- Like -->
    <div class="icon" title="Like">
      <img class="icon-img" [src]="icons.like" alt="Like" />
    </div>

    <!-- Cart -->
    <div class="icon">
      @if (buy > 0) {
        <span class="badge">{{ buy }}</span>
      }
      <img class="icon-img" (click)="toCart()" [src]="icons.shopping" alt="shopping" />
    </div>
    
    <!-- Notification -->
    <div class="icon">
      @if (notification > 0) {
        <span class="badge">{{ notification }}</span>
      }
      <img class="icon-img" [src]="icons.notification" alt="notification" />
    </div>

    <!-- Sign In -->
    <button class="sign-in-btn" (click)="signIn()">Sign In</button>
  </div>
</div>
